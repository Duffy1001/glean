name: release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  model:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install zstd
        run: sudo apt-get update -qq && sudo apt-get install -y -qq zstd
      - name: Prepare embedded models
        run: ./scripts/prepare-embedded-model.sh all
      - uses: actions/upload-artifact@v4
        with:
          name: embedded-model
          path: assets/*.gguf.zst
          retention-days: 1

  unix:
    needs: model
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            os: linux
            arch: amd64
          - runner: ubuntu-24.04-arm
            os: linux
            arch: arm64
          - runner: macos-13
            os: darwin
            arch: amd64
          - runner: macos-14
            os: darwin
            arch: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Install native dependencies
        run: |
          if [ "${{ matrix.os }}" = linux ]; then
            sudo apt-get update -qq
            sudo apt-get install -y -qq build-essential cmake
          else
            brew install cmake
          fi
      - uses: actions/download-artifact@v4
        with:
          name: embedded-model
          path: assets
      - name: Build native libraries
        env:
          CMAKE_EXTRA_ARGS: ${{ matrix.os == 'darwin' && '-DCMAKE_OSX_DEPLOYMENT_TARGET=12.0' || '' }}
          MACOSX_DEPLOYMENT_TARGET: ${{ matrix.os == 'darwin' && '12.0' || '' }}
        run: make build-llama build-bridge
      - name: Build editions
        env:
          VERSION: ${{ github.ref_name }}
          MACOSX_DEPLOYMENT_TARGET: ${{ matrix.os == 'darwin' && '12.0' || '' }}
        run: |
          mkdir -p dist
          if [ "${{ matrix.os }}" = linux ]; then
            CGO_ENABLED=1 go build -ldflags "-s -w -X main.version=${VERSION} -extldflags=-static" -tags "osusergo netgo" -o "dist/glean-thin-fast-${{ matrix.os }}-${{ matrix.arch }}" .
            CGO_ENABLED=1 go build -ldflags "-s -w -X main.version=${VERSION} -extldflags=-static" -tags "osusergo netgo high" -o "dist/glean-thin-high-${{ matrix.os }}-${{ matrix.arch }}" .
            CGO_ENABLED=1 go build -ldflags "-s -w -X main.version=${VERSION} -extldflags=-static" -tags "osusergo netgo embedded" -o "dist/glean-full-fast-${{ matrix.os }}-${{ matrix.arch }}" .
            CGO_ENABLED=1 go build -ldflags "-s -w -X main.version=${VERSION} -extldflags=-static" -tags "osusergo netgo embedded high" -o "dist/glean-full-high-${{ matrix.os }}-${{ matrix.arch }}" .
          else
            CGO_ENABLED=1 go build -ldflags "-s -w -X main.version=${VERSION}" -o "dist/glean-thin-fast-${{ matrix.os }}-${{ matrix.arch }}" .
            CGO_ENABLED=1 go build -ldflags "-s -w -X main.version=${VERSION}" -tags high -o "dist/glean-thin-high-${{ matrix.os }}-${{ matrix.arch }}" .
            CGO_ENABLED=1 go build -ldflags "-s -w -X main.version=${VERSION}" -tags embedded -o "dist/glean-full-fast-${{ matrix.os }}-${{ matrix.arch }}" .
            CGO_ENABLED=1 go build -ldflags "-s -w -X main.version=${VERSION}" -tags "embedded high" -o "dist/glean-full-high-${{ matrix.os }}-${{ matrix.arch }}" .
          fi
      - name: Verify artifacts
        run: |
          file dist/glean-*
          dist/glean-thin-fast-${{ matrix.os }}-${{ matrix.arch }} --version
          dist/glean-thin-high-${{ matrix.os }}-${{ matrix.arch }} --version
          dist/glean-full-fast-${{ matrix.os }}-${{ matrix.arch }} --version
          dist/glean-full-high-${{ matrix.os }}-${{ matrix.arch }} --version
          if [ "${{ matrix.os }}" = linux ]; then
            ! readelf -d dist/glean-* | grep NEEDED
          else
            bad=$(otool -L dist/glean-* | grep -v '^dist/' | grep -vE '^\s+(/usr/lib/|/System/Library/)' || true)
            test -z "$bad"
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.os }}-${{ matrix.arch }}
          path: dist/glean-*

  windows:
    needs: model
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Export Go root for MSYS2
        shell: pwsh
        run: '"GOROOT=$(go env GOROOT)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append'
      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            git
            make
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-ninja
      - uses: actions/download-artifact@v4
        with:
          name: embedded-model
          path: assets
      - name: Build native libraries
        shell: msys2 {0}
        env:
          CMAKE_EXTRA_ARGS: -G Ninja
          CFLAGS: -D_WIN32_WINNT=0x0A00 -DWINVER=0x0A00
          CXXFLAGS: -D_WIN32_WINNT=0x0A00 -DWINVER=0x0A00
        run: make build-llama build-bridge
      - name: Build editions
        shell: msys2 {0}
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          export PATH="$(cygpath -u "$GOROOT")/bin:$PATH"
          go version
          mkdir -p dist
          CGO_ENABLED=1 go build -ldflags "-s -w -X main.version=${VERSION} -extldflags=-static" -o dist/glean-thin-fast-windows-amd64.exe .
          CGO_ENABLED=1 go build -ldflags "-s -w -X main.version=${VERSION} -extldflags=-static" -tags high -o dist/glean-thin-high-windows-amd64.exe .
          CGO_ENABLED=1 go build -ldflags "-s -w -X main.version=${VERSION} -extldflags=-static" -tags embedded -o dist/glean-full-fast-windows-amd64.exe .
          CGO_ENABLED=1 go build -ldflags "-s -w -X main.version=${VERSION} -extldflags=-static" -tags "embedded high" -o dist/glean-full-high-windows-amd64.exe .
      - name: Verify artifacts
        shell: msys2 {0}
        run: |
          file dist/*.exe
          dist/glean-thin-fast-windows-amd64.exe --version
          dist/glean-thin-high-windows-amd64.exe --version
          dist/glean-full-fast-windows-amd64.exe --version
          dist/glean-full-high-windows-amd64.exe --version
          ! objdump -p dist/*.exe | grep 'DLL Name' | grep -viE '(KERNEL32|msvcrt|USER32|ADVAPI32|WS2_32|bcrypt|ntdll)'
      - uses: actions/upload-artifact@v4
        with:
          name: binaries-windows-amd64
          path: dist/*.exe

  release:
    needs: [unix, windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: binaries-*
          path: artifacts
          merge-multiple: true
      - name: Generate checksums
        working-directory: artifacts
        run: sha256sum glean-* > checksums.txt
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*
