name: ci

on:
  push:
    branches: [master]
  pull_request:

permissions: {}

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          submodules: recursive

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff
        with:
          go-version-file: go.mod
          cache: true

      - name: Install native dependencies
        run: sudo apt-get update -qq && sudo apt-get install -y -qq build-essential cmake glslc libvulkan-dev spirv-headers

      - name: Run unit tests
        run: make test

      - name: Build CLI
        run: make build-go

      - name: Run integration tests
        run: go test -tags integration ./... -run '^TestEndToEnd'
